                                    </h2>
                                    <p className="text-base font-medium text-slate-500 dark:text-slate-400 max-w-[260px] leading-relaxed">
                                        The space is quiet. Be the first to share a thought in this safe haven.
                                    </p>
                                </div>
                                <Link to="/new" className="group relative w-full flex items-center justify-center gap-2 h-14 px-8 bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all duration-200 rounded-xl shadow-lg shadow-primary/25 mt-4 overflow-hidden">
                                    <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                                    <span className="material-symbols-outlined text-white text-[20px]">edit_note</span>
                                    <span className="text-white text-base font-bold tracking-wide relative z-10">Share a Thought</span>
                                </Link>
                            </div>
                        </main>
                        
                        <BottomNav active="explore" />
                    </div>
                </div>
            );
        };

        // --- Screen 4: Report Modal ---
        const ReportScreen = () => {
            const navigate = useNavigate();

            return (
                <div className="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden h-screen w-full relative">
                    {/* Simulated Background Feed Content (Blurred/Dimmed) */}
                    <div className="absolute inset-0 z-0 opacity-20 pointer-events-none flex flex-col gap-4 p-4">
                        <div className="w-full h-40 bg-gray-200 dark:bg-surface-dark rounded-xl"></div>
                        <div className="w-full h-64 bg-gray-200 dark:bg-surface-dark rounded-xl"></div>
                        <div className="w-full h-40 bg-gray-200 dark:bg-surface-dark rounded-xl"></div>
                    </div>
                    {/* Modal Backdrop */}
                    <div className="absolute inset-0 z-10 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                        {/* Modal Card */}
                        <div className="w-full max-w-[340px] bg-white dark:bg-surface-dark rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-fade-in-up transform transition-all">
                            {/* Icon & Header Section */}
                            <div className="flex flex-col items-center pt-8 pb-4 px-6 text-center gap-4">
                                <div className="w-16 h-16 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center mb-2">
                                    <span className="material-symbols-outlined text-red-500/80 dark:text-red-400 text-3xl">
                                        shield_with_heart
                                    </span>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <h2 className="text-gray-900 dark:text-white text-xl font-bold leading-tight tracking-tight">
                                        Report this confession?
                                    </h2>
                                    <p className="text-gray-500 dark:text-gray-400 text-sm font-medium leading-relaxed">
                                        Help us keep this space safe. This confession will be hidden from your feed immediately.
                                    </p>
                                </div>
                            </div>
                            {/* Action Buttons */}
                            <div className="p-4 grid grid-cols-2 gap-3">
                                <button onClick={() => navigate(-1)} className="flex w-full cursor-pointer items-center justify-center rounded-xl h-12 px-4 bg-transparent hover:bg-gray-100 dark:hover:bg-white/5 text-gray-600 dark:text-gray-300 text-base font-bold transition-colors duration-200">
                                    Cancel
                                </button>
                                <button onClick={() => navigate('/')} className="flex w-full cursor-pointer items-center justify-center rounded-xl h-12 px-4 bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400 text-base font-bold transition-colors duration-200">
                                    Report
                                </button>
                            </div>
                            <div className="h-2"></div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- App ---
        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<HomeScreen />} />
                        <Route path="/new" element={<NewConfessionScreen />} />
                        <Route path="/explore" element={<ExploreEmptyScreen />} />
                        <Route path="/profile" element={<ExploreEmptyScreen />} /> {/* Reusing screen for demo */}
                        <Route path="/report" element={<ReportScreen />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
